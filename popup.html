<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Boundary</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="title">Boundary</div>
        <div class="chip" id="permissionChip">检查中...</div>
      </header>

      <section class="site">
        <div class="label">当前站点</div>
        <div class="value" id="siteValue">--</div>
      </section>

      <section class="status">
        <div>
          <div class="label">平台状态</div>
          <div class="value" id="platformValue">--</div>
        </div>
      </section>

      <section class="section">
        <div class="label">当前站点设置</div>
        <div class="toggle-row">
          <label class="toggle">
            <span class="switch">
              <input type="checkbox" id="toggleInput" />
              <span class="slider"></span>
            </span>
            <span class="toggle-label">隐藏搜索框内容</span>
          </label>
        </div>
        <div class="toggle-row">
          <label class="toggle">
            <span class="switch">
              <input type="checkbox" id="toggleSuggest" />
              <span class="slider"></span>
            </span>
            <span class="toggle-label">隐藏下拉推荐</span>
          </label>
        </div>
        <div class="toggle-row">
          <label class="toggle">
            <span class="switch">
              <input type="checkbox" id="toggleAutocomplete" />
              <span class="slider"></span>
            </span>
            <span class="toggle-label">关闭浏览器补全</span>
          </label>
        </div>
      </section>

      <section class="actions">
        <button id="openOptions" class="ghost">打开选项页</button>
        <button id="reloadTab" class="ghost">刷新当前页</button>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
